name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. force-push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt · clippy · test · build)
    # Windows matches Kata's primary/release platform; the Tauri backend
    # (app/src-tauri) compiles here with no extra system deps, unlike Linux.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        # Only needed to run the sidecar-staging script below (no npm deps).
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Stage the kata sidecar
        # kata-app declares `kata` as an externalBin; its tauri build script
        # fails unless binaries/kata-<triple> exists. This builds kata-cli and
        # stages it so clippy/test/build can compile the Tauri backend.
        run: node app/scripts/stage-sidecar.mjs

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test workspace
        # The real-claude smoke test is opt-in (KATA_SMOKE_REAL unset → skipped).
        run: cargo test --workspace

      - name: Schema freshness (regenerate & diff)
        # Fails if schema/kata-events.schema.json has drifted from the enum.
        # Regenerate locally with:
        #   KATA_BLESS_SCHEMA=1 cargo test -p kata-core --features schema schema_artifact_is_fresh
        run: cargo test -p kata-core --features schema schema_artifact_is_fresh

      - name: TS bindings freshness (ts-rs, regenerate & diff)
        # Fails if the ts-rs TS bindings (app/src/bindings/*.ts) have drifted
        # from the Rust types. --ignore-cr-at-eol tolerates the Windows runner's
        # CRLF vs the committed LF; `git add -N` makes a brand-new, uncommitted
        # binding surface as drift too. Regenerate locally with:
        #   cargo test -p kata-core --features ts export_bindings
        run: |
          cargo test -p kata-core --features ts export_bindings
          git add --intent-to-add app/src/bindings/
          git diff --ignore-cr-at-eol --exit-code app/src/bindings/

      - name: Build (locked)
        run: cargo build --locked

  web:
    name: Workbench (check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Event types freshness (regenerate & diff)
        # Regenerate the TS event types from the committed schema and fail on
        # drift. Regenerate locally with: (cd app && npm run gen:events)
        run: |
          npm run gen:events
          git diff --exit-code src/bindings/kata-events.ts

      - name: Type-check (svelte-check)
        run: npm run check

      - name: Unit tests (Vitest)
        run: npm test
