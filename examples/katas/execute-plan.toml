schema = 1
name = "execute-plan"
description = "Execute a written plan via subagents, TDD per step (superpowers subagent-driven-development)"
workdir = "."

task = """
Use the superpowers subagent-driven-development skill to execute an existing implementation plan:

<<Path to the plan file to execute, e.g. docs/superpowers/plans/<YYYY-MM-DD>-<topic>.md. Override this task at launch.>>

Work the plan step by step. Dispatch a subagent for each independent task. Follow the repo's TDD discipline without exception: write the failing test first, watch it fail for the right reason, then write the minimal code to pass. Keep the build, lint, and tests green between steps (run the exact commands CLAUDE.md specifies). Stay within the plan's scope — do not add unrequested features or refactors — and surface any blocker instead of guessing. Commit only if CLAUDE.md's rules say to and the user has asked.
"""

[identity]
mode = "append"
system_prompt = """
Before anything else, read the CLAUDE.md at the root of the workspace and treat it as binding for this entire run — its instructions override your defaults. If it points to nested CLAUDE.md files (for example app/CLAUDE.md) that govern the area you are working in, read and follow those too. Honor every convention it states — TDD workflow, commands, code style, design rules, commit rules — to the letter. If anything in the task conflicts with CLAUDE.md, stop and surface the conflict instead of silently choosing.
"""

[model]
id = "opus"

[plugins.superpowers]

[leash]
max_turns = 60
timeout_secs = 7200
max_budget_usd = 10.0
isolation = "worktree"

[auth]
bare = false

[interactive]
enabled = false
