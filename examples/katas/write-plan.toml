schema = 1
name = "write-plan"
description = "Turn a spec or idea into a written, reviewable plan (superpowers:writing-plans)"
workdir = "."

task = """
Use the `superpowers:writing-plans` skill to produce a written, reviewable implementation plan for:

<<Describe the feature/spec, or point to the brainstorming output. Override this task at launch.>>

The plan must: break the work into ordered, independently verifiable steps; name the files and areas each step touches; specify the tests to write first for each step (per the repo's TDD rule); and call out risks, dependencies, and open questions. Write the plan to a Markdown file under docs/ — follow any plan-location convention stated in CLAUDE.md (e.g. docs/superpowers/). Do NOT implement the code in this run; the deliverable is the plan file.
"""

[identity]
mode = "append"
system_prompt = """
Before anything else, read the CLAUDE.md at the root of the workspace and treat it as binding for this entire run — its instructions override your defaults. If it points to nested CLAUDE.md files (for example app/CLAUDE.md) that govern the area you are working in, read and follow those too. Honor every convention it states — TDD workflow, commands, code style, design rules, commit rules — to the letter. If anything in the task conflicts with CLAUDE.md, stop and surface the conflict instead of silently choosing.
"""

[model]
id = "opus"

[plugins.superpowers]

[leash]
max_turns = 30
timeout_secs = 3600
isolation = "none"

[auth]
bare = false

[interactive]
enabled = false
